<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OPVSCVLA">
  <!-- OPVSCVLA app icon.
       The catalogue's one constant graphic device is the 3px DOUBLE rule
       (index.html .rule, every colophon border). Bent into a circle it reads
       at once as the O of OPVSCVLA, a pressed record, and a bell rim — the
       three metaphors the works live in. Dark parchment ground (--ground),
       ivory line (--txt), and the red "stamp" arc that recurs in the SCALA,
       PEAL and RILLE emblems. No text: legible from 512px to 16px. -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#f0e2c6" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#f0e2c6" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f0e2c6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#14120f"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="107" fill="none"
        stroke="#e9e2d2" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- the double rule, made a ring -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="#e9e2d2" stroke-width="9"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#e9e2d2" stroke-width="9"/>

  <!-- a faint inner groove — the pressing -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="#e9e2d2" stroke-opacity="0.22" stroke-width="2"/>

  <!-- the red stamp: a struck arc over the outer rule, top-right -->
  <path d="M 303.4 90.7 A 172 172 0 0 1 417.6 197.2" fill="none"
        stroke="#d8604f" stroke-width="9" stroke-linecap="round"/>

  <!-- spindle: the tonic / the centre the works turn on -->
  <circle cx="256" cy="256" r="30" fill="#e9e2d2"/>
  <circle cx="256" cy="256" r="8.5" fill="#14120f"/>
</svg>
