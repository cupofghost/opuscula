<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>RILLE · URTEIL — quick audition</title>
<style>
  :root{--bg:#14171a;--pane:#1b2024;--line:#2c343a;--fg:#e6ebee;--dim:#8a969d;
        --yes:#5fae7a;--no:#c96b6b;--maybe:#c9a24a;--hot:#e6c86e}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);
       font:15px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace;
       display:flex;flex-direction:column;align-items:center;-webkit-text-size-adjust:100%}
  .engine{position:fixed;left:-10000px;top:0;width:360px;height:280px;border:0} /* hidden sound engine */
  .wrap{width:100%;max-width:460px;padding:22px 18px 40px;display:flex;flex-direction:column;gap:18px;flex:1}
  header h1{margin:0;font-size:17px;letter-spacing:.16em;font-weight:600}
  header .op{color:var(--dim);font-weight:400}
  .lede{color:var(--dim);font-size:12.5px;margin-top:6px;line-height:1.5}
  .moods{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .moods .lbl{color:var(--dim);font-size:10.5px;letter-spacing:.14em;width:100%;margin-bottom:2px}
  .moods button{font:inherit;font-size:11.5px;color:var(--fg);background:var(--pane);border:1px solid var(--line);
                border-radius:999px;padding:5px 11px;cursor:pointer;letter-spacing:.03em}
  .moods button.on{background:#243a42;border-color:var(--hot);color:#fff}
  .now{background:var(--pane);border:1px solid var(--line);border-radius:12px;padding:20px 16px;text-align:center}
  .now .state{font-size:12px;color:var(--dim);letter-spacing:.14em}
  .now .id{font-size:20px;letter-spacing:.06em;margin-top:6px;font-weight:600;min-height:26px}
  .now .id b{color:var(--hot)}
  .now .sub{color:var(--dim);font-size:11.5px;margin-top:2px}
  .next{width:100%;font:inherit;font-size:16px;letter-spacing:.08em;font-weight:600;color:#0f1512;
        background:var(--hot);border:0;border-radius:12px;padding:15px;cursor:pointer;margin-top:16px}
  .next:active{transform:translateY(1px)}
  .next.sub{background:var(--pane);color:var(--fg);border:1px solid var(--line);font-size:13px;padding:11px;margin-top:9px}
  .verdicts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .verdicts button{font:inherit;font-size:15px;font-weight:600;letter-spacing:.05em;color:#0f1512;
                   border:0;border-radius:12px;padding:16px 8px;cursor:pointer}
  .verdicts button:active{transform:translateY(1px)}
  .verdicts .yes{background:var(--yes)} .verdicts .maybe{background:var(--maybe)} .verdicts .no{background:var(--no)}
  .verdicts button:disabled{opacity:.35;cursor:default}
  .note{width:100%;background:#12161a;color:var(--fg);border:1px solid var(--line);border-radius:10px;
        padding:10px 12px;font:13px/1.4 inherit;resize:none}
  .note::placeholder{color:#5c666d}
  .bottom{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:8px}
  .tally{color:var(--dim);font-size:12px;text-align:center}
  .tally b{color:var(--fg)}
  .row{display:flex;gap:8px}
  .row button{flex:1;font:inherit;font-size:12px;color:var(--fg);background:var(--pane);border:1px solid var(--line);
              border-radius:9px;padding:9px;cursor:pointer;letter-spacing:.04em}
  #copied{color:var(--yes);font-size:12px;text-align:center;min-height:15px}
  .foot{color:var(--dim);font-size:10.5px;text-align:center;line-height:1.6}
  a{color:var(--hot)}
</style>
</head>
<body>
<iframe class="engine" id="engine" title="RILLE engine" allow="autoplay" src="index.html?judge&amp;factory"></iframe>
<div class="wrap">
  <header>
    <h1><span class="op">RILLE ·</span> URTEIL</h1>
    <div class="lede" id="lede">Loading the engine…</div>
  </header>

  <div class="moods" id="moods"><span class="lbl">MOOD (focus — optional)</span></div>

  <div class="now">
    <div class="state" id="state">— press Next —</div>
    <div class="id" id="nowid">&nbsp;</div>
    <div class="sub" id="nowsub">a fresh pressing, straight into the melodic part</div>
    <button class="next" id="next">▶ NEXT SNIPPET</button>
    <button class="next sub" id="replay" disabled>↻ replay this one</button>
  </div>

  <div class="verdicts">
    <button class="yes"   id="yes"   disabled>YES<br><span style="font-weight:400;font-size:11px">ja</span></button>
    <button class="maybe" id="maybe" disabled>MAYBE<br><span style="font-weight:400;font-size:11px">vielleicht</span></button>
    <button class="no"    id="no"    disabled>NO<br><span style="font-weight:400;font-size:11px">nein</span></button>
  </div>
  <textarea class="note" id="note" rows="2" placeholder="optional note on this one (what worked / didn't)…"></textarea>

  <div class="bottom">
    <div class="tally" id="tally">nothing rated yet</div>
    <div class="row">
      <button id="copy">⧉ COPY RESULTS</button>
      <button id="stop">■ silence</button>
      <button id="clear">clear</button>
    </div>
    <div id="copied"></div>
    <div class="foot">Rate → it jumps to the next automatically. Copy the results into the chat when you're done.<br>
      Backstage tool, not an op. · <a href="index.html">back to RILLE</a></div>
  </div>
</div>

<script>
const MOODS=[
 {i:0,en:'DARKNESS',de:'Finsternis'},{i:1,en:'SHADOW',de:'Schatten'},{i:2,en:'TEARS',de:'Tränen'},
 {i:3,en:'IRON',de:'Eisen'},{i:4,en:'DAWN',de:'Dämmerung'},{i:5,en:'VOID',de:'Leere'},{i:6,en:'UNDERTOW',de:'Sog'}];
const LS='opvscvla.rille.urteil.v3';
const $=id=>document.getElementById(id);
const engine=$('engine');
const post=m=>{try{engine.contentWindow.postMessage(Object.assign({rilleJudge:1},m),'*')}catch(e){}};

let ready=false, moodPick=null, cur=null, log=load();

function load(){try{return JSON.parse(localStorage.getItem(LS))||[]}catch(e){return []}}
function save(){try{localStorage.setItem(LS,JSON.stringify(log))}catch(e){}}
const hex=s=>'#'+(s>>>0).toString(16).slice(0,4);

/* mood focus chips: "Any" (random) + the seven moods */
(function(){
  const el=$('moods');
  const add=(label,val)=>{const b=document.createElement('button');b.textContent=label;
    b.classList.toggle('on', (val==='ANY'?moodPick==null:moodPick===val));
    b.onclick=()=>{moodPick=(val==='ANY'?null:val);
      [...el.querySelectorAll('button')].forEach(x=>x.classList.remove('on'));b.classList.add('on');};
    el.appendChild(b);};
  add('Any','ANY');
  MOODS.forEach(m=>add(m.en,m.i));
})();

function next(){
  if(!ready)return;
  const mood=(moodPick==null)?(Math.random()*7|0):moodPick;
  const seed=(Math.random()*0xffffffff)>>>0;
  cur={mood,seed};
  post({op:'snippet',mood,seed});
  $('state').textContent='▶ now playing';
  $('nowid').innerHTML='<b>'+MOODS[mood].en+'</b> · '+hex(seed);
  $('nowsub').textContent=MOODS[mood].de+' · a fresh pressing';
  ['yes','maybe','no','replay'].forEach(id=>$(id).disabled=false);
}
function replay(){ if(cur)post({op:'snippet',mood:cur.mood,seed:cur.seed}); }
function rate(v){
  if(!cur)return;
  log.push({mood:MOODS[cur.mood].en,de:MOODS[cur.mood].de,seed:cur.seed.toString(16),
            verdict:v,note:$('note').value.trim(),ts:new Date().toISOString()});
  save(); $('note').value=''; tally(); next();     // auto-advance = the fast loop
}
function tally(){
  const c={yes:0,maybe:0,no:0}; log.forEach(r=>c[r.verdict]!==undefined&&c[r.verdict]++);
  $('tally').innerHTML = log.length ? ('rated <b>'+log.length+'</b> — 👍 '+c.yes+' · 🤔 '+c.maybe+' · 👎 '+c.no) : 'nothing rated yet';
}
function copyOut(){
  const out={machine:'rille',what:'quick audition — rate generated melodic snippets',rated:log,ts:new Date().toISOString()};
  const t=JSON.stringify(out,null,2);
  navigator.clipboard.writeText(t).then(()=>flash('copied ✓')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');flash('copied ✓')}catch(e){flash('copy failed')}ta.remove();});
}
function flash(s){$('copied').textContent=s;setTimeout(()=>$('copied').textContent='',1800);}

$('next').onclick=next;
$('replay').onclick=replay;
$('yes').onclick=()=>rate('yes');
$('maybe').onclick=()=>rate('maybe');
$('no').onclick=()=>rate('no');
$('stop').onclick=()=>{post({op:'stop'});$('state').textContent='— silenced —';};
$('copy').onclick=copyOut;
$('clear').onclick=()=>{if(confirm('Clear all ratings?')){log=[];save();tally();}};

window.addEventListener('message',ev=>{
  const m=ev.data; if(!m||m.rilleJudge!==1)return;
  if(m.op==='ready'){ready=true;$('lede').textContent='Hit Next — a fresh RILLE pressing drops in on the melodic part (no intro build). Rate it and the next plays automatically.';}
});
engine.addEventListener('load',()=>{let n=0;const t=setInterval(()=>{post({op:'hello'});if(ready||++n>24)clearInterval(t);},250);});
tally();
</script>
</body>
</html>
